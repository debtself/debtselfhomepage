[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redirect /planner to the gate screen
[[redirects]]
  from = "/planner"
  to = "/planner/index.html"
  status = 200

# Redirect /planner/tool to the tool screen (auth checked in JS)
[[redirects]]
  from = "/planner/tool"
  to = "/planner/tool/index.html"
  status = 200

# Redirect /admin/generate-code to the admin code generation tool
[[redirects]]
  from = "/admin/generate-code"
  to = "/admin/generate-code/index.html"
  status = 200
